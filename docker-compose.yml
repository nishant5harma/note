services:
  # ---------- TODO's ------------
  # - add the backend container here to docker-compose for local development
  # - add worker container for BullMQ processing
  # ------------------------------

  # ------------------------------
  # Postgres
  # ------------------------------
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5435:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  # ------------------------------
  # Redis
  # ------------------------------
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  # ------------------------------
  # Postgres Visualizer (pgAdmin4)
  # ------------------------------
  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # ------------------------------
  # Redis Visualizer (RedisInsight)
  # ------------------------------
  redisinsight:
    image: redis/redisinsight:latest
    restart: always
    ports:
      - "5540:5540"
    depends_on:
      - redis

  # ------------------------------
  # BullMQ Visualizer (BullMQ UI)
  # ------------------------------
  bullmq-ui:
    image: deadly0/bull-board:latest
    ports:
      - "9999:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis

volumes:
  db-data:
